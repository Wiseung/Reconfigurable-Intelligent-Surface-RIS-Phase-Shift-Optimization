seed: 7

env:
  tf_device: cpu
  tf_memory_limit_mb: 14336
  max_depth: 1
  path_num_samples: 512
  coverage_num_samples: 2048
  probe_num_samples: 16
  state_num_paths: 8
  rx_height_m: 1.5
  rx_jitter_xy_m: 0.5
  blind_spot_search_center: [-10.0, 90.0, 1.5]
  blind_spot_search_size: [48.0, 48.0]
  blind_spot_cell_size: [12.0, 12.0]
  num_blind_spot_candidates: 3
  require_native_ris: true
  discrete_phase: true
  num_bits: 2
  mobility_enabled: true
  zone_spawn_mode: all
  zone_nlos_search_center: [-10.0, 90.0, 1.5]
  zone_nlos_search_size: [48.0, 48.0]
  zone_nlos_cell_size: [12.0, 12.0]
  zone_los_search_center: [-70.0, 45.0, 1.5]
  zone_los_search_size: [48.0, 48.0]
  zone_los_cell_size: [12.0, 12.0]
  zone_num_candidates_per_zone: 2

agent:
  hidden_dim: 256
  batch_size: 4
  replay_capacity: 256
  actor_lr: 0.0003
  critic_lr: 0.0003
  alpha_lr: 0.0003
  init_alpha: 0.2
  use_cnn_feature_extractor: true
  state_channels: 2
  state_antennas: 1
  state_delay_taps: 8
  state_feature_dim: 256
  cnn_conv1_channels: 16
  cnn_conv2_channels: 32
  cnn_kernel_size_1: 3
  cnn_kernel_size_2: 3
  cnn_pool_size: 2
  device:

train:
  num_episodes: 4
  max_steps_per_episode: 4
  warmup_steps: 4
  updates_per_step: 1
  checkpoint_every: 0
  deterministic_eval: true
  eval_every_episodes: 2
  eval_num_episodes: 1
  save_best_eval_checkpoint: true
  best_eval_metric: eval_avg_reward

logging:
  output_dir: runs
  experiment_name: sac_ris_smoke_phase2_academic
  log_file: training.log
  metrics_file: metrics.jsonl
  csv_file: episode_metrics.csv
  save_final_checkpoint: true
