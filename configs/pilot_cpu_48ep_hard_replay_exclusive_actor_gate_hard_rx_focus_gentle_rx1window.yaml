seed: 7

env:
  tx_boresight_target: [0.0, 90.0, 1.5]
  tf_device: cpu
  tf_memory_limit_mb: 14336
  max_depth: 2
  path_num_samples: 5000
  coverage_num_samples: 20000
  probe_num_samples: 64
  state_num_paths: 64
  rx_height_m: 1.5
  rx_jitter_xy_m: 1.0
  blind_spot_search_center: [-10.0, 90.0, 1.5]
  blind_spot_search_size: [80.0, 80.0]
  blind_spot_cell_size: [8.0, 8.0]
  num_blind_spot_candidates: 8
  ris_position: [-180.0, 100.0, 20.0]
  require_native_ris: true

agent:
  hidden_dim: 512
  batch_size: 64
  replay_capacity: 10000
  dual_replay: true
  hard_replay_capacity: 4000
  hard_replay_ratio: 0.125
  hard_replay_prioritized: true
  hard_replay_priority_alpha: 1.0
  hard_replay_uniform_ratio: 0.2
  hard_replay_priority_epsilon: 0.001
  prioritized_replay: false
  replay_priority_alpha: 1.0
  replay_uniform_ratio: 0.0
  replay_priority_epsilon: 0.001
  actor_lr: 0.0003
  critic_lr: 0.0003
  alpha_lr: 0.0003
  init_alpha: 0.05
  target_entropy_scale: 0.20
  alpha_min: 0.01
  alpha_max: 0.08
  device:

train:
  num_episodes: 48
  max_steps_per_episode: 8
  warmup_steps: 64
  warmup_action_scale: 0.18
  policy_exploration_scale_start: 0.18
  policy_exploration_scale_end: 0.03
  policy_additive_noise_std_start: 0.01
  policy_additive_noise_std_end: 0.0
  policy_noise_decay_steps: 256
  collection_deterministic_prob_start: 0.00
  collection_deterministic_prob_end: 0.85
  collection_deterministic_prob_decay_steps: 256
  collection_deterministic_noise_std: 0.0
  policy_delay: 2
  hard_actor_update_gap_threshold: 4.0
  hard_actor_policy_delay: 6
  hard_actor_min_observations: 2
  rx_block_episodes: 2
  rx_block_episodes_start: 2
  rx_block_episodes_end: 1
  rx_block_transition_episode: 21
  hard_rx_focus_enabled: true
  hard_rx_focus_start_episode: 21
  hard_rx_focus_end_episode: 40
  hard_rx_focus_probability: 0.20
  hard_rx_focus_gap_power: 1.2
  hard_rx_focus_min_gap: 0.10
  hard_rx_focus_warmup_episodes: 2
  hard_rx_priority_scale: 0.05
  updates_per_step: 1
  checkpoint_every: 12
  deterministic_eval: true
  eval_every_episodes: 2
  eval_num_episodes: 2
  save_best_eval_checkpoint: true
  best_eval_metric: eval_avg_reward
  reward_margin_weight: 0.30
  reward_margin_positive_weight: 0.20
  reward_margin_negative_weight: 0.50
  reward_baseline_key: phase_gradient_reflector_rate
  hard_replay_route_mode: exclusive
  hard_replay_step_gap_threshold: 4.0
  hard_replay_block_gap_threshold: 4.0
  hard_step_priority_scale: 0.0
  hard_block_priority_scale: 0.0
  hard_priority_max: 8.0

logging:
  output_dir: runs
  experiment_name: sac_ris_pilot_cpu_48ep_hard_replay_exclusive_actor_gate_hard_rx_focus_gentle_rx1window
  log_file: training.log
  metrics_file: metrics.jsonl
  csv_file: episode_metrics.csv
  save_final_checkpoint: true
